# config/agents.yaml — curated agent-name pool; user-editable.
# `spawn random <model> <topic>` picks an unused agent from this pool.
# Names are matched case-insensitively; conventionally lowercase at use site.
# Grouping by section is documentation only; section membership lives in core/colors.ts.
agents:
  # strings
  - violin
  - viola
  - cello
  - contrabass
  - harp
  # woodwinds
  - flute
  - piccolo
  - oboe
  - clarinet
  - bassoon
  - recorder
  # brass
  - horn
  - trumpet
  - trombone
  - tuba
  - cornet
  # percussion
  - timpani
  - celesta
  - vibraphone
  - marimba
  - xylophone
  - glockenspiel
  # keys
  - piano
  - organ
  - harpsichord
  # early
  - lute
  - theorbo
  - viol
  - sackbut
  - shawm
  - crumhorn
  - cittern
